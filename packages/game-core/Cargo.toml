[package]
name = "game-core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
bevy_ecs = "0.19"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"
getrandom = { version = "0.4", features = ["wasm_js"] }

[dev-dependencies]
serde_yaml = "0.9"
